name: Build Firmware

on:
  push:
    branches: [ main, master ]
    paths:
      - "core/device_config.h"
      - "**/*.c"
      - "**/*.h"
      - "Makefile"
      - ".github/workflows/build_firmware.yml"
  pull_request:
    paths:
      - "core/device_config.h"
      - "**/*.c"
      - "**/*.h"
      - "Makefile"
      - ".github/workflows/build_firmware.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Extract version number
        id: extract_version
        run: |
          MAJOR=$(grep '#define MAJOR_VERSION' core/device_config.h | awk '{print $3}')
          MINOR=$(grep '#define MINOR_VERSION' core/device_config.h | awk '{print $3}')
          BUILD=$(grep '#define BUILD' core/device_config.h | awk '{print $3}')
          VERSION="${MAJOR}.${MINOR}.${BUILD}"
          VERSION_DASHED="${MAJOR}-${MINOR}-${BUILD}"

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION_DASHED=$VERSION_DASHED" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_dashed=$VERSION_DASHED" >> $GITHUB_OUTPUT

          if [ "$MAJOR" -eq 0 ]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Check if release already exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ steps.extract_version.outputs.version }}"
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/$VERSION)

          if [ "$RESPONSE" == "200" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Download & Install ARM GCC Toolchain
        if: steps.check_release.outputs.exists == 'false'
        run: |
          wget 'https://developer.arm.com/-/media/Files/downloads/gnu/13.3.rel1/binrel/arm-gnu-toolchain-13.3.rel1-x86_64-arm-none-eabi.tar.xz' -O compiler.tar.xz
          tar -xf compiler.tar.xz
          echo "$(pwd)/arm-gnu-toolchain-13.3.rel1-x86_64-arm-none-eabi/bin" >> $GITHUB_PATH

      - name: Verify Compiler
        if: steps.check_release.outputs.exists == 'false'
        run: arm-none-eabi-gcc -v

      - name: Build Firmware Variants
        if: steps.check_release.outputs.exists == 'false'
        run: |
          set -e

          # Create temp directory for artifacts
          mkdir -p firmware_artifacts

          # Build first variant, put in firmware_artifacts
          make clean
          make BOARD=dingopdm_v7
          cp build/dingopdm_v7.hex firmware_artifacts/dingopdm_v7_FW_v${VERSION_DASHED}.hex
          cp build/dingopdm_v7.bin firmware_artifacts/dingopdm_v7_FW_v${VERSION_DASHED}.bin
          cp build/dingopdm_v7.elf firmware_artifacts/dingopdm_v7_FW_v${VERSION_DASHED}.elf

          # Build second variant — keep in firmware_artifacts so the next 'make clean' can't wipe it
          make clean
          make BOARD=dingopdmmax_v1
          cp build/dingopdmmax_v1.hex firmware_artifacts/dingopdmmax_v1_FW_v${VERSION_DASHED}.hex
          cp build/dingopdmmax_v1.bin firmware_artifacts/dingopdmmax_v1_FW_v${VERSION_DASHED}.bin
          cp build/dingopdmmax_v1.elf firmware_artifacts/dingopdmmax_v1_FW_v${VERSION_DASHED}.elf

          # Build third variant — also into firmware_artifacts
          make clean
          make BOARD=canboard_v2
          cp build/canboard_v2.hex firmware_artifacts/canboard_v2_FW_v${VERSION_DASHED}.hex
          cp build/canboard_v2.bin firmware_artifacts/canboard_v2_FW_v${VERSION_DASHED}.bin
          cp build/canboard_v2.elf firmware_artifacts/canboard_v2_FW_v${VERSION_DASHED}.elf

          # Copy all renamed artifacts back to build/ for the release action
          cp firmware_artifacts/* build/
          
          ls -l build/
        env:
          VERSION_DASHED: ${{ steps.extract_version.outputs.version_dashed }}

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.extract_version.outputs.version }}
          name: Release v${{ steps.extract_version.outputs.version }}
          prerelease: ${{ steps.extract_version.outputs.prerelease }}
          generate_release_notes: true
          body: |
            ## Firmware Release v${{ steps.extract_version.outputs.version }}
      
            **dingoPDM:**
            - [HEX](https://github.com/${{ github.repository }}/releases/download/v${{ steps.extract_version.outputs.version }}/dingopdm_v7_FW_v${{ steps.extract_version.outputs.version_dashed }}.hex)
            - [BIN](https://github.com/${{ github.repository }}/releases/download/v${{ steps.extract_version.outputs.version }}/dingopdm_v7_FW_v${{ steps.extract_version.outputs.version_dashed }}.bin)
            - [ELF](https://github.com/${{ github.repository }}/releases/download/v${{ steps.extract_version.outputs.version }}/dingopdm_v7_FW_v${{ steps.extract_version.outputs.version_dashed }}.elf)
            
            **dingoPDM-Max:**
            - [HEX](https://github.com/${{ github.repository }}/releases/download/v${{ steps.extract_version.outputs.version }}/dingopdmmax_v1_FW_v${{ steps.extract_version.outputs.version_dashed }}.hex)
            - [BIN](https://github.com/${{ github.repository }}/releases/download/v${{ steps.extract_version.outputs.version }}/dingopdmmax_v1_FW_v${{ steps.extract_version.outputs.version_dashed }}.bin)
            - [ELF](https://github.com/${{ github.repository }}/releases/download/v${{ steps.extract_version.outputs.version }}/dingopdmmax_v1_FW_v${{ steps.extract_version.outputs.version_dashed }}.elf)

            **CANBoard:**
            - [HEX](https://github.com/${{ github.repository }}/releases/download/v${{ steps.extract_version.outputs.version }}/canboard_v2_FW_v${{ steps.extract_version.outputs.version_dashed }}.hex)
            - [BIN](https://github.com/${{ github.repository }}/releases/download/v${{ steps.extract_version.outputs.version }}/canboard_v2_FW_v${{ steps.extract_version.outputs.version_dashed }}.bin)
            - [ELF](https://github.com/${{ github.repository }}/releases/download/v${{ steps.extract_version.outputs.version }}/canboard_v2_FW_v${{ steps.extract_version.outputs.version_dashed }}.elf)
          files: |
            build/dingopdm_v7_FW_v${{ steps.extract_version.outputs.version_dashed }}.hex
            build/dingopdm_v7_FW_v${{ steps.extract_version.outputs.version_dashed }}.bin
            build/dingopdm_v7_FW_v${{ steps.extract_version.outputs.version_dashed }}.elf
            build/dingopdmmax_v1_FW_v${{ steps.extract_version.outputs.version_dashed }}.hex
            build/dingopdmmax_v1_FW_v${{ steps.extract_version.outputs.version_dashed }}.bin
            build/dingopdmmax_v1_FW_v${{ steps.extract_version.outputs.version_dashed }}.elf
            build/canboard_v2_FW_v${{ steps.extract_version.outputs.version_dashed }}.hex
            build/canboard_v2_FW_v${{ steps.extract_version.outputs.version_dashed }}.bin
            build/canboard_v2_FW_v${{ steps.extract_version.outputs.version_dashed }}.elf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
